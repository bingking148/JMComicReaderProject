<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - JM Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div style="display: flex; align-items: center;">
                    <i class="fas fa-book-open"></i> JM Reader
                </div>
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="nav-menu">
                <div class="nav-category">浏览</div>
                <a href="/" class="nav-item">
                    <i class="fas fa-home"></i> 发现
                </a>
                <a href="/search" class="nav-item active">
                    <i class="fas fa-search"></i> 搜索
                </a>
                
                <div class="nav-category" style="margin-top: 24px;">书库</div>
                <a href="/downloaded" class="nav-item">
                    <i class="fas fa-bookmark"></i> 本地书架
                </a>
                <a href="#" class="nav-item" onclick="showCacheStatus()">
                    <i class="fas fa-database"></i> 系统维护
                </a>
            </div>
            
            <div class="sidebar-footer">
                <div style="font-size: 12px; color: var(--text-tertiary);">
                    v2.0.0
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div class="page-title">搜索</div>
                <div class="header-actions">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" class="search-input" placeholder="关键词..." value="{{ keyword if keyword else '' }}">
                    </div>
                    <select id="sortSelect" class="search-input" style="width: 140px;">
                        <option value="desc">收藏: 高 → 低</option>
                        <option value="asc">收藏: 低 → 高</option>
                    </select>
                </div>
            </header>
            
            <div class="content-area">
                <div class="container">
                    <h3 style="margin-bottom: 24px; font-weight: 600; display: flex; align-items: center; justify-content: space-between;">
                        搜索结果
                        <span style="font-size: 13px; color: var(--text-tertiary); font-weight: 400;" id="resultCount"></span>
                    </h3>
                    
                    <div id="comicGrid" class="grid">
                        <!-- Dynamic Content -->
                    </div>
                    
                    <div id="loading" style="text-align: center; padding: 40px; display: none; color: var(--text-secondary);">
                        <i class="fas fa-spinner fa-spin" style="font-size: 24px;"></i>
                        <p style="margin-top: 12px; font-size: 14px;">正在搜索...</p>
                    </div>
                    
                    <div id="loadMore" style="text-align: center; padding: 20px; display: none;">
                        <button class="btn btn-secondary" onclick="loadMore()">加载更多</button>
                    </div>
                    
                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <div class="empty-icon"><i class="fas fa-search"></i></div>
                        <h3>未找到结果</h3>
                        <p>尝试更换关键词搜索</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        const initialKeyword = "{{ keyword if keyword else '' }}";
        let currentPage = 1;
        let currentSort = 'desc';
        let isLoading = false;
        
        document.addEventListener('DOMContentLoaded', () => {
            if(initialKeyword) {
                performSearch(initialKeyword);
            } else {
                document.getElementById('emptyState').style.display = 'flex';
                document.querySelector('.empty-state h3').textContent = '开始搜索';
                document.querySelector('.empty-state p').textContent = '输入关键词查找漫画';
            }
            
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    const val = e.target.value.trim();
                    if(val) {
                        // Update URL without reload
                        history.pushState({}, '', `/search?keyword=${encodeURIComponent(val)}`);
                        currentPage = 1;
                        performSearch(val);
                    }
                }
            });
            
            document.getElementById('sortSelect').addEventListener('change', (e) => {
                currentSort = e.target.value;
                const val = document.getElementById('searchInput').value.trim();
                if(val) {
                    currentPage = 1;
                    performSearch(val);
                }
            });
        });
        
        async function performSearch(keyword, append = false) {
            if(isLoading) return;
            isLoading = true;
            
            const grid = document.getElementById('comicGrid');
            const empty = document.getElementById('emptyState');
            const loader = document.getElementById('loading');
            const loadMoreBtn = document.getElementById('loadMore');
            
            if(!append) {
                grid.innerHTML = '';
                empty.style.display = 'none';
            }
            loader.style.display = 'block';
            loadMoreBtn.style.display = 'none';
            
            try {
                const res = await apiRequest(`/api/search/keyword?keyword=${encodeURIComponent(keyword)}&sort=${currentSort}&page=${currentPage}`);
                
                if(res && res.length > 0) {
                    renderResults(res);
                    document.getElementById('resultCount').textContent = `${document.querySelectorAll('.card').length} 个结果`;
                    loadMoreBtn.style.display = 'block';
                } else {
                    if(!append) empty.style.display = 'flex';
                    loadMoreBtn.style.display = 'none';
                }
            } catch(e) {
                console.error(e);
                alert('搜索出错');
            } finally {
                isLoading = false;
                loader.style.display = 'none';
            }
        }
        
        function renderResults(comics) {
            const grid = document.getElementById('comicGrid');
            
            comics.forEach(comic => {
                const coverUrl = comic.cover ? `/api/cover/${comic.id}` : 'https://via.placeholder.com/200x300';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = `/detail/${comic.id}`;
                
                card.innerHTML = `
                    <div class="card-cover-wrapper">
                        <img src="https://via.placeholder.com/200x300?text=Loading..." data-src="${comic.id}" class="card-cover lazy-cover">
                        <div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; font-weight: 500;">
                            <i class="fas fa-heart" style="font-size: 10px; margin-right: 4px;"></i>${comic.favorites}
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-title" title="${comic.title}">${comic.title}</div>
                        <div class="card-meta">${comic.author || '未知作者'}</div>
                        <div class="card-footer">
                            ${(comic.tags || []).slice(0, 2).map(tag => `<span>#${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            lazyLoadCovers();
        }
        
        function loadMore() {
            currentPage++;
            const val = document.getElementById('searchInput').value.trim();
            performSearch(val, true);
        }
        
        async function lazyLoadCovers() {
            const images = document.querySelectorAll('.lazy-cover:not(.loaded)');
            for(let img of images) {
                const id = img.dataset.src;
                try {
                    const res = await fetch(`/api/cover/${id}`);
                    const data = await res.json();
                    if(data.success) {
                        img.src = data.data.cover;
                        img.classList.add('loaded');
                    }
                } catch(e) {}
            }
        }
        
        async function showCacheStatus() {
            // ... (Same reuse logic as other pages)
            try {
                const status = await apiRequest('/api/cache/status');
                alert(`缓存大小: ${status.cache_size_mb} MB`);
            } catch(e) {}
        }
    </script>
</body>
</html>
