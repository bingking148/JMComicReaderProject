<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画详情 - JM Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div style="display: flex; align-items: center;">
                    <i class="fas fa-book-open"></i> JM Reader
                </div>
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="nav-menu">
                <div class="nav-category">浏览</div>
                <a href="/" class="nav-item">
                    <i class="fas fa-home"></i> 发现
                </a>
                <a href="/search" class="nav-item">
                    <i class="fas fa-search"></i> 搜索
                </a>
                
                <div class="nav-category" style="margin-top: 24px;">书库</div>
                <a href="/downloaded" class="nav-item">
                    <i class="fas fa-bookmark"></i> 本地书架
                </a>
                <a href="#" class="nav-item" onclick="showCacheStatus()">
                    <i class="fas fa-database"></i> 系统维护
                </a>
            </div>
            
            <div class="sidebar-footer">
                <div style="font-size: 12px; color: var(--text-tertiary);">
                    v2.0.0
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div class="page-title">详情</div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i> 返回
                    </button>
                </div>
            </header>
            
            <div class="content-area">
                <div class="container">
                    <div id="detailContainer">
                        <!-- Loading State -->
                        <div style="display: flex; justify-content: center; align-items: center; height: 400px; flex-direction: column;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--text-tertiary);"></i>
                            <p style="margin-top: 16px; color: var(--text-secondary);">正在加载漫画信息...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        const jmId = {{ jm_id }};
        let isDownloaded = false;

        document.addEventListener('DOMContentLoaded', loadComicDetail);

        async function loadComicDetail() {
            try {
                const comic = await apiRequest(`/api/search/jm/${jmId}`);
                renderDetail(comic);
                checkDownloadStatus();
            } catch (error) {
                console.error(error);
                document.getElementById('detailContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-exclamation-circle"></i></div>
                        <h3>加载失败</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-secondary" style="margin-top: 16px;" onclick="location.reload()">重试</button>
                    </div>
                `;
            }
        }

        function renderDetail(comic) {
            const container = document.getElementById('detailContainer');
            const coverUrl = comic.cover || 'https://via.placeholder.com/300x450';
            
            container.innerHTML = `
                <div class="detail-layout">
                    <!-- Left Column: Cover -->
                    <div class="detail-sidebar">
                        <img src="${coverUrl}" class="detail-cover">
                    </div>
                    
                    <!-- Right Column: Info -->
                    <div class="detail-content">
                        <div class="detail-header">
                            <h1>${comic.title}</h1>
                            <div class="detail-meta-list">
                                <div class="detail-meta-item">
                                    <i class="fas fa-user"></i> ${comic.author || '未知作者'}
                                </div>
                                <div class="detail-meta-item">
                                    <i class="fas fa-file-alt"></i> ${comic.pages || 0} 页
                                </div>
                                <div class="detail-meta-item">
                                    <i class="fas fa-hashtag"></i> JM${comic.id}
                                </div>
                            </div>
                        </div>
                        
                        <div class="tag-container">
                            ${(comic.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        
                        <div class="action-bar">
                            <div id="actionButtons" style="display: flex; gap: 12px;">
                                <button class="btn btn-primary" onclick="downloadComic(${comic.id})">
                                    <i class="fas fa-download"></i> 获取漫画
                                </button>
                            </div>
                        </div>
                        
                        <div id="downloadProgress" style="display: none; margin-bottom: 32px; background-color: var(--bg-body); padding: 16px; border-radius: var(--radius-md);">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: var(--text-secondary);">
                                <span>下载中...</span>
                                <span id="progressText">0%</span>
                            </div>
                            <div class="progress-wrapper">
                                <div id="progressBar" class="progress-fill" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="section">
                            <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary);">简介</h3>
                            <p style="line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap;">${comic.description || '暂无简介'}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function checkDownloadStatus() {
            try {
                const list = await apiRequest('/api/downloaded');
                const exists = list.find(c => c.id == jmId);
                if (exists) {
                    isDownloaded = true;
                    updateButtons();
                }
            } catch(e) {}
        }

        function updateButtons() {
            const btnContainer = document.getElementById('actionButtons');
            if(isDownloaded) {
                btnContainer.innerHTML = `
                    <button class="btn btn-primary" onclick="startReading(${jmId})">
                        <i class="fas fa-book-reader"></i> 开始阅读
                    </button>
                    <button class="btn btn-secondary" onclick="if(confirm('重新下载？')) downloadComic(${jmId})">
                        <i class="fas fa-redo"></i> 重新获取
                    </button>
                `;
            }
        }
        
        async function downloadComic(id) {
            try {
                document.getElementById('downloadProgress').style.display = 'block';
                const res = await fetch(`/api/download/${id}`, {method: 'POST'});
                const data = await res.json();
                
                if(data.success) {
                    monitorProgress(data.download_id);
                } else {
                    alert(data.message);
                    document.getElementById('downloadProgress').style.display = 'none';
                }
            } catch(e) {
                alert('下载请求失败');
            }
        }

        function monitorProgress(dlId) {
            const interval = setInterval(async () => {
                const res = await apiRequest(`/api/download/progress/${dlId}`);
                const bar = document.getElementById('progressBar');
                const text = document.getElementById('progressText');
                
                if(bar) bar.style.width = res.progress + '%';
                if(text) text.textContent = res.message;
                
                if(res.status === 'completed') {
                    clearInterval(interval);
                    isDownloaded = true;
                    updateButtons();
                    document.getElementById('downloadProgress').style.display = 'none';
                } else if(res.status === 'error') {
                    clearInterval(interval);
                    alert('下载失败');
                }
            }, 1000);
        }
        
        async function showCacheStatus() {
            try {
                const status = await apiRequest('/api/cache/status');
                alert(`缓存大小: ${status.cache_size_mb} MB`);
            } catch(e) {}
        }
    </script>
</body>
</html>
