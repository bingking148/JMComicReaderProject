<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地书架 - JM Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div style="display: flex; align-items: center;">
                    <i class="fas fa-book-open"></i> JM Reader
                </div>
                <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open')">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <div class="nav-menu">
                <div class="nav-category">浏览</div>
                <a href="/" class="nav-item">
                    <i class="fas fa-home"></i> 发现
                </a>
                <a href="/search" class="nav-item">
                    <i class="fas fa-search"></i> 搜索
                </a>
                
                <div class="nav-category" style="margin-top: 24px;">书库</div>
                <a href="/downloaded" class="nav-item active">
                    <i class="fas fa-bookmark"></i> 本地书架
                </a>
                <a href="#" class="nav-item" onclick="showCacheStatus()">
                    <i class="fas fa-database"></i> 系统维护
                </a>
            </div>
            
            <div class="sidebar-footer">
                <div style="font-size: 12px; color: var(--text-tertiary);">
                    v{{ app_version }}
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div class="page-title">本地书架</div>
                <div class="header-actions">
                    <div class="search-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="localSearch" class="search-input" placeholder="筛选已下载...">
                    </div>
                    <button class="btn btn-secondary" onclick="loadDownloadedComics()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-danger" onclick="cleanupCache()">
                        <i class="fas fa-trash"></i> 清理
                    </button>
                </div>
            </header>
            
            <div class="content-area">
                <div class="container">
                    <!-- Stats Cards -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">总藏书量</div>
                            <div class="stat-value" id="totalCount">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">总页数</div>
                            <div class="stat-value" id="totalPages">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">占用空间</div>
                            <div class="stat-value" id="totalSize">-</div>
                        </div>
                    </div>
                    
                    <h3 style="margin-bottom: 24px; font-weight: 600; display: flex; align-items: center; justify-content: space-between;">
                        全部漫画
                        <span style="font-size: 13px; color: var(--text-tertiary); font-weight: 400;" id="resultCount">加载中...</span>
                    </h3>
                    
                    <!-- Grid -->
                    <div id="comicGrid" class="grid">
                        <!-- Dynamic Content -->
                    </div>
                    
                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <div class="empty-icon">
                            <i class="fas fa-box-open"></i>
                        </div>
                        <h3>书架空空如也</h3>
                        <p style="margin-bottom: 24px;">您还没有下载任何漫画，快去发现精彩内容吧！</p>
                        <a href="/" class="btn btn-primary">去发现</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        let allComics = [];

        document.addEventListener('DOMContentLoaded', loadDownloadedComics);

        // Filter functionality
        document.getElementById('localSearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allComics.filter(c => 
                (c.title || '').toLowerCase().includes(term) || 
                (c.author || '').toLowerCase().includes(term)
            );
            renderComics(filtered);
        });

        async function loadDownloadedComics() {
            try {
                const grid = document.getElementById('comicGrid');
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-secondary);">正在加载书架...</div>';
                
                const comics = await apiRequest('/api/downloaded');
                allComics = comics;
                
                updateStats(comics);
                renderComics(comics);
                
            } catch (error) {
                console.error(error);
                alert('加载失败: ' + error.message);
            }
        }

        function updateStats(comics) {
            document.getElementById('totalCount').textContent = comics.length;
            const pages = comics.reduce((sum, c) => sum + (c.pages || 0), 0);
            document.getElementById('totalPages').textContent = formatNumber(pages);
            
            const size = comics.reduce((sum, c) => sum + (c.file_size || 0), 0);
            document.getElementById('totalSize').textContent = (size / 1024 / 1024).toFixed(1) + ' MB';
            
            document.getElementById('resultCount').textContent = `${comics.length} 本`;
        }

        function renderComics(comics) {
            const grid = document.getElementById('comicGrid');
            const empty = document.getElementById('emptyState');
            
            grid.innerHTML = '';
            
            if (comics.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'flex';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            
            comics.forEach(comic => {
                const coverUrl = comic.cover_path ? `/api/cover/downloaded/${comic.id}` : 'https://via.placeholder.com/200x300?text=No+Cover';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.location.href = `/detail/${comic.id}`;
                
                card.innerHTML = `
                    <div class="card-cover-wrapper">
                        <img src="${coverUrl}" class="card-cover" loading="lazy">
                        <div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; font-weight: 500;">
                            ${comic.pages}P
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-title" title="${comic.title}">${comic.title}</div>
                        <div class="card-meta">${comic.author || '未知作者'}</div>
                        <div class="card-footer">
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <button class="btn btn-primary" style="flex: 1; height: 32px; font-size: 12px;" onclick="event.stopPropagation(); startReading(${comic.id})">
                                    阅读
                                </button>
                                <button class="btn btn-danger" style="width: 32px; height: 32px; padding: 0;" onclick="event.stopPropagation(); deleteComic(${comic.id})">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        async function cleanupCache() {
            if(confirm('确定要清理缓存文件吗？这不会删除已下载的漫画。')) {
                try {
                    const res = await apiRequest('/api/cache/clear', {method: 'POST'});
                    alert(`清理完成，释放空间 ${res.cleared_size_mb} MB`);
                } catch(e) {
                    alert('清理失败');
                }
            }
        }
    </script>
</body>
</html>
